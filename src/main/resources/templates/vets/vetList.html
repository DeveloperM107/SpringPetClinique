<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout (~{::body},'vets')}">

<body>

<div class="container mt-4">

    <!-- Title -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="fw-bold text-primary">
            <i class="bi bi-person-badge-fill"></i> Veterinarians
        </h2>
    </div>

    <!-- Card wrapper -->
    <div class="card shadow-sm border-0">
        <div class="card-body">

            <table id="vets" class="table table-hover align-middle">
                <thead class="table-dark">
                <tr>
                    <th>Name</th>
                    <th>Specialties</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="vet : ${vets.vetList}">
                    
                    <!-- Vet Name -->
                    <td class="fw-semibold"
                        th:text="${vet.firstName + ' ' + vet.lastName}">
                    </td>

                    <!-- Specialties -->
                    <td>
                        <span th:each="specialty : ${vet.specialties}"
                              class="badge bg-success me-1"
                              th:text="${specialty.name}">
                        </span>

                        <span th:if="${vet.nrOfSpecialties == 0}"
                              class="text-muted fst-italic">
                            none
                        </span>
                    </td>

                </tr>
                </tbody>
            </table>

        </div>
    </div>

</div>

</body>
</html>
