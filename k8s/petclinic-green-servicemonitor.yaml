apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: petclinic-green
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      monitor: green
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 15s
