apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: petclinic-green
  namespace: monitoring
  labels:
    release: monitoring
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: petclinic
      app.kubernetes.io/instance: petclinic-green
  namespaceSelector:
    matchNames:
      - default
  endpoints:
    - port: http
      path: /manage/prometheus
      interval: 15s
